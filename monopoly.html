<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly Board Generator</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:Arial, sans-serif; background:#f0f2f5; padding:20px; }
  .panel { background:white; border-radius:10px; padding:24px; max-width:700px; margin:0 auto 20px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  h1 { text-align:center; color:#333; margin-bottom:20px; }
  label { font-weight:bold; display:block; margin-bottom:6px; color:#444; font-size:14px; }
  input[type=file] { width:100%; padding:10px; border:2px dashed #aaa; border-radius:8px; margin-bottom:12px; cursor:pointer; }
  input[type=text] { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:14px; margin-bottom:16px; }
  .thumbs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .thumb { width:50px; height:50px; border-radius:5px; object-fit:cover; border:2px solid #ddd; }
  .count { font-size:13px; color:#666; margin-bottom:16px; }
  .count span { font-weight:bold; color:#27ae60; }
  .btns { display:flex; gap:10px; flex-wrap:wrap; }
  button { padding:12px 24px; border:none; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer; }
  .btn-gen { background:#27ae60; color:white; }
  .btn-print { background:#2980b9; color:white; display:none; }
  .btn-clear { background:#e74c3c; color:white; }
  .error { background:#ffe0e0; color:#c0392b; padding:12px; border-radius:8px; margin-top:12px; display:none; }

  #board-section { display:none; }
  #board-section h2 { text-align:center; color:#333; margin-bottom:20px; }

  .board-outer { display:flex; justify-content:center; }
  .board {
    display:grid;
    grid-template-columns: 90px repeat(6, 60px) 90px;
    grid-template-rows: 90px repeat(6, 60px) 90px;
    border:5px solid #111;
    background:white;
  }

  .cell {
    border:1px solid #888;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:white;
    padding:2px;
  }
  .cell img { width:100%; height:65%; object-fit:cover; display:block; }
  .cell-name { font-size:6px; text-align:center; color:#222; line-height:1.3; margin-top:2px; word-break:break-word; }

  .corner {
    border:1px solid #888;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:#c8f7c5;
    padding:4px;
  }
  .corner img { width:100%; height:55%; object-fit:cover; display:block; }
  .corner-name { font-size:8px; font-weight:bold; text-align:center; color:#1a5e1a; margin-top:4px; }

  .center-cell {
    grid-column: 2 / 8;
    grid-row: 2 / 8;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#e8f5e9;
    border:1px solid #888;
  }
  .center-cell span {
    font-size:32px;
    font-weight:bold;
    color:#1a5e1a;
    text-align:center;
    line-height:1.3;
  }

  @media print {
    body { background:white; padding:0; margin:0; }
    .panel:first-child { display:none !important; }
    #board-section { display:block !important; max-width:100%; }
    #board-section h2 { display:none; }
    .btn-print { display:none !important; }
    .board-outer { justify-content:center; }
    .board {
      grid-template-columns: 80px repeat(6, 54px) 80px;
      grid-template-rows: 80px repeat(6, 54px) 80px;
      border-width:4px;
    }
  }
</style>
</head>
<body>

<div class="panel">
  <h1>🎲 Monopoly Board Generator</h1>

  <label>Upload 28 images (4 corners + 6 per side):</label>
  <input type="file" id="img-input" multiple accept="image/*">
  <div class="thumbs" id="thumbs"></div>
  <div class="count">Images loaded: <span id="img-count">0</span> / 28</div>

  <label>Space names — 28 comma-separated (optional):</label>
  <input type="text" id="names-input" placeholder="Go, Mediterranean Ave, Baltic Ave, ...">

  <div class="btns">
    <button class="btn-gen" onclick="generate()">Generate Board</button>
    <button class="btn-print" id="print-btn" onclick="window.print()">Print / Save as PDF</button>
    <button class="btn-clear" onclick="clearAll()">Clear</button>
  </div>
  <div class="error" id="error-msg"></div>
</div>

<div id="board-section" class="panel" style="max-width:900px;">
  <h2>Your Monopoly Board</h2>
  <div class="board-outer">
    <div class="board" id="board"></div>
  </div>
</div>

<script>
let images = [];
let loadedCount = 0;

function resizeImage(src, size, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    canvas.getContext('2d').drawImage(img, 0, 0, size, size);
    callback(canvas.toDataURL('image/jpeg', 0.75));
  };
  img.src = src;
}

document.getElementById('img-input').addEventListener('change', function(e) {
  images = [];
  loadedCount = 0;
  document.getElementById('thumbs').innerHTML = '';
  document.getElementById('img-count').textContent = '0';

  Array.from(e.target.files).forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = ev => {
      resizeImage(ev.target.result, 120, (small) => {
        images[i] = small;
        loadedCount++;
        document.getElementById('img-count').textContent = loadedCount;
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = small;
        document.getElementById('thumbs').appendChild(img);
      });
    };
    reader.readAsDataURL(file);
  });
});

function generate() {
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  const filled = images.filter(Boolean).length;
  if (filled < 28) {
    errEl.textContent = `Need 28 images. You have ${filled}.`;
    errEl.style.display = 'block';
    return;
  }

  const rawNames = document.getElementById('names-input').value;
  const names = rawNames ? rawNames.split(',').map(s => s.trim()) : [];
  while (names.length < 28) names.push('');

  // 28 slots clockwise starting bottom-right corner:
  // slot 0 = bottom-right corner   → grid (8,8)
  // slots 1-6 = bottom row r→l     → (8,7)(8,6)(8,5)(8,4)(8,3)(8,2)
  // slot 7 = bottom-left corner    → (8,1)
  // slots 8-13 = left col b→t      → (7,1)(6,1)(5,1)(4,1)(3,1)(2,1)
  // slot 14 = top-left corner      → (1,1)
  // slots 15-20 = top row l→r      → (1,2)(1,3)(1,4)(1,5)(1,6)(1,7)
  // slot 21 = top-right corner     → (1,8)
  // slots 22-27 = right col t→b    → (2,8)(3,8)(4,8)(5,8)(6,8)(7,8)
  // Grid is 8 cols x 8 rows (1-indexed in CSS grid)

  const slots = [
    {r:8,c:8,corner:true},
    {r:8,c:7},{r:8,c:6},{r:8,c:5},{r:8,c:4},{r:8,c:3},{r:8,c:2},
    {r:8,c:1,corner:true},
    {r:7,c:1},{r:6,c:1},{r:5,c:1},{r:4,c:1},{r:3,c:1},{r:2,c:1},
    {r:1,c:1,corner:true},
    {r:1,c:2},{r:1,c:3},{r:1,c:4},{r:1,c:5},{r:1,c:6},{r:1,c:7},
    {r:1,c:8,corner:true},
    {r:2,c:8},{r:3,c:8},{r:4,c:8},{r:5,c:8},{r:6,c:8},{r:7,c:8},
  ];

  const board = document.getElementById('board');
  board.innerHTML = '';

  // Build a lookup map row,col → slot index
  const map = {};
  slots.forEach((s, i) => { map[`${s.r},${s.c}`] = i; });

  for (let r = 1; r <= 8; r++) {
    for (let c = 1; c <= 8; c++) {
      // Center area
      if (r >= 2 && r <= 7 && c >= 2 && c <= 7) {
        if (r === 2 && c === 2) {
          const center = document.createElement('div');
          center.className = 'center-cell';
          center.style.gridColumn = '2 / 8';
          center.style.gridRow = '2 / 8';
          center.innerHTML = '<span>FREE<br>PARKING</span>';
          board.appendChild(center);
        }
        continue;
      }

      const key = `${r},${c}`;
      if (map[key] === undefined) { continue; }

      const idx = map[key];
      const slot = slots[idx];
      const name = names[idx] || '';
      const imgSrc = images[idx];

      const cell = document.createElement('div');
      cell.className = slot.corner ? 'corner' : 'cell';
      cell.style.gridColumn = c;
      cell.style.gridRow = r;

      const imgEl = document.createElement('img');
      imgEl.src = imgSrc;
      imgEl.alt = '';

      const label = document.createElement('div');
      label.className = slot.corner ? 'corner-name' : 'cell-name';
      label.textContent = name;

      cell.appendChild(imgEl);
      cell.appendChild(label);
      board.appendChild(cell);
    }
  }

  document.getElementById('board-section').style.display = 'block';
  document.getElementById('print-btn').style.display = 'inline-block';
  document.getElementById('board-section').scrollIntoView({ behavior: 'smooth' });
}

function clearAll() {
  images = [];
  loadedCount = 0;
  document.getElementById('img-input').value = '';
  document.getElementById('thumbs').innerHTML = '';
  document.getElementById('img-count').textContent = '0';
  document.getElementById('names-input').value = '';
  document.getElementById('board').innerHTML = '';
  document.getElementById('board-section').style.display = 'none';
  document.getElementById('print-btn').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
}
</script>
</body>
</html>
